<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
}

/* LOGIN SCREEN */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:url("bg1.gif") no-repeat center center/cover;
}

/* LOGO */
.logo-top{
  position:absolute;
  top:20px;
  left:30px;
}
.logo-top img{
  width:200px;
  filter: drop-shadow(0 0 10px orange);
}

/* LOGIN BOX */
.login-box-modern{
  width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,255,0.2);
}

.login-box-modern input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.3);
  background:transparent;
  color:white;
}

.login-box-modern button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="loginScreen">
  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box-modern">
    <img src="logo.png" style="width:80px;">
    <h2>Sign In</h2>

    <input id="username" placeholder="Email">
    <input id="password" type="password">

    <button id="loginBtn">Sign In</button>
    <p id="error" style="color:red;display:none;"></p>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

/* LOGIN */
loginBtn.onclick = async () => {
  const email = username.value.trim();
  const pass = password.value.trim();

  try {
    await auth.signInWithEmailAndPassword(email, pass);
    window.location.href = "index.html";
  } catch (err) {
    error.innerText = err.message;
    error.style.display = "block";
  }
};

/* AUTO LOGIN */
auth.onAuthStateChanged(user => {
  if(user){
    window.location.href = "index.html";
  }
});
</script>

</body>
</html>
