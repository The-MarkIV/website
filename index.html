<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Road+Rage&display=swap');

/* MAIN PAGE BACKGROUND */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:url("bg2.gif") repeat;
  background-size:cover;
}

/* LOGIN SCREEN BACKGROUND */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:url("bg1.gif") no-repeat center center/cover;
  z-index:10;
}

/* LOGOS */
.logo-top{
  position:absolute;
  top:20px;
  left:30px;
}
.logo-top img,
.nav-logo,
.mini-logo{
  filter: drop-shadow(0 0 10px orange);
  transition:0.3s;
}
.logo-top img{ width:200px; }
.nav-logo{ width:70px; }
.mini-logo{ width:80px; margin-bottom:10px; }

.logo-top img:hover,
.nav-logo:hover,
.mini-logo:hover{
  filter: drop-shadow(0 0 25px orange) drop-shadow(0 0 40px gold);
  transform:scale(1.05);
}

/* LOGIN BOX */
.login-box-modern{
  width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,255,0.2);
  transition:0.3s;
}
.login-box-modern:hover{
  box-shadow:0 0 50px rgba(0,255,255,0.5);
}

/* INPUT */
.login-box-modern input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.3);
  background:transparent;
  color:white;
}

/* BUTTON */
.login-box-modern button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px rgba(255,140,0,0.6);
  transition:0.3s;
}
.login-box-modern button:hover{
  box-shadow:0 0 25px rgba(255,140,0,1);
}

/* NAVBAR */
.navbar{
  padding:15px 30px;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
}
.nav-left{
  display:flex;
  align-items:center;
  gap:15px;
}

/* ROAD RAGE TITLE */
.nav-title{
  font-family:"Road Rage", sans-serif;
  font-size:2.8rem;
  letter-spacing:2px;
  color:#fff;
  text-shadow:
    0 0 5px #fff,
    0 0 10px #ff9800,
    0 0 20px #ff5722,
    0 0 40px #ff5722;
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse{
  from{
    text-shadow:
      0 0 5px #fff,
      0 0 10px #ff9800,
      0 0 20px #ff5722,
      0 0 40px #ff5722;
  }
  to{
    text-shadow:
      0 0 10px #fff,
      0 0 20px #ff9800,
      0 0 30px #ff5722,
      0 0 60px #ff5722;
  }
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px cyan, 0 0 40px rgba(0,255,255,0.5);
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-body{ padding:10px; }

/* 🔥 MODERN BUTTONS */
.card-body button{
  padding:10px 14px;
  margin:5px 5px 0 0;
  border:none;
  border-radius:8px;
  font-size:0.85rem;
  cursor:pointer;
  transition:all 0.25s ease;
  font-weight:500;
}

/* Preview */
.card-body button:nth-child(2){
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
}
.card-body button:nth-child(2):hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 0 20px rgba(0,114,255,1);
}

/* Open */
.card-body button:nth-child(3){
  background:linear-gradient(45deg,#00ff87,#60efff);
  color:#000;
}
.card-body button:nth-child(3):hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 0 20px rgba(0,255,135,1);
}

/* Edit */
.card-body button:nth-child(4){
  background:linear-gradient(45deg,#f7971e,#ffd200);
  color:#000;
}
.card-body button:nth-child(4):hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 0 20px rgba(255,210,0,1);
}

/* Delete */
.card-body button:nth-child(5){
  background:linear-gradient(45deg,#ff416c,#ff4b2b);
  color:white;
}
.card-body button:nth-child(5):hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 0 20px rgba(255,75,43,1);
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:999;
  justify-content:center;
  align-items:center;
}

/* 🔥 IMPROVED DRAG & DROP BAR */
.uploader {
  margin-bottom: 10px;
  padding: 30px;
  border: 2px dashed rgba(255,255,255,0.5);
  border-radius: 15px;
  text-align: center;
  color: #fff;
  font-size: 1.1rem;
  transition: all 0.3s ease;
  background: rgba(255,255,255,0.05);
  cursor: pointer;
}

.uploader:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(0, 255, 255, 0.7);
  box-shadow: 0 0 20px rgba(0,255,255,0.3);
}

.uploader.dragover {
  background: rgba(0,255,255,0.15);
  border-color: #00ffff;
  box-shadow: 0 0 25px #00ffff;
}

.uploader input[type="file"] {
  display: none;
}

/* Center the Add Link button below uploader */
.addLinkContainer {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

.addLinkContainer button {
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(45deg,#00c6ff,#0072ff);
  color: #fff;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.3s ease;
}

.addLinkContainer button:hover {
  background: linear-gradient(45deg,#0072ff,#00c6ff);
  box-shadow: 0 0 25px rgba(0,114,255,0.8);
  transform: scale(1.05);
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box-modern">
    <img src="logo.png" class="mini-logo">
    <h2>Sign In</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password">

    <button id="loginBtn">Sign In</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <img src="logo.png" class="nav-logo">
    <h2 class="nav-title">Temple of Learning</h2>
  </div>
</div>

<!-- MAIN -->
<div class="container">

<input type="text" id="searchInput" placeholder="🔍 Search PPT...">

<div class="uploader" id="dropZone">
  <p>📂 Drag & Drop PPT</p>
  <input type="file" id="fileInput">
</div>

<div class="addLinkContainer">
  <button onclick="addByLink()">Add Link</button>
</div>

<div id="grid" class="grid"></div>

</div>

<!-- MODAL -->
<div id="previewModal">
  <div style="width:85%; height:85%; background:#000; position:relative;">
    <button onclick="closePreview()" style="position:absolute; top:10px; right:10px;">❌</button>
    <button onclick="prevSlide()" style="position:absolute; left:10px; top:50%;">⬅️</button>
    <button onclick="nextSlide()" style="position:absolute; right:10px; top:50%;">➡️</button>
    <iframe id="previewFrame" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// 🔥 ORIGINAL JS REMAINS UNCHANGED
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;

loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
  } else error.style.display="block";
};

async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(i => (i.title || "").toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card" data-index="${i}">
    <img src="${it.thumbnail || 'https://via.placeholder.com/400x300'}">
    <div class="card-body">
      <h3>${it.title || "Untitled"}</h3>
      <button class="previewBtn">Preview</button>
      <button class="openBtn">Open</button>
      <button class="editBtn">Edit</button>
      <button class="deleteBtn">Delete</button>
    </div>
  </div>`).join('');
}

searchInput.oninput = render;

// 🔥 HELPER: Convert link to embeddable version
function getEmbedLink(link){
  if(link.includes("docs.google.com/presentation")){
    return link.replace("/edit","/embed").replace("/view","/embed");
  }
  if(link.includes("onedrive.live.com")){
    if(link.includes("?")) return link.split("?")[0] + "?embed";
    return link + "?embed";
  }
  return link;
}

// 🔥 UPDATED addByLink FUNCTION
function addByLink() {
  let link = prompt("Enter your OneDrive or Google Slides link:");
  if(!link) return;
  const googleSlidePattern = /https:\/\/docs\.google\.com\/presentation\/.*/;
  const oneDrivePattern = /https:\/\/(www\.)?onedrive\.live\.com\/.*/;
  if(googleSlidePattern.test(link) || oneDrivePattern.test(link)){
    const title = prompt("Enter PPT title:") || "Untitled";
    db.collection("ppts").add({
      title: title,
      link: link,
      thumbnail: "https://via.placeholder.com/400x300"
    }).then(docRef => {
      items.push({id: docRef.id, title: title, link: link});
      render();
    }).catch(err => alert("Error adding link: " + err));
  } else {
    alert("Invalid link! Please enter a valid Google Slides or OneDrive link.");
  }
}

function openPreview(link,index){
  currentIndex = index;
  previewModal.style.display = "flex";
  previewFrame.src = getEmbedLink(link);
}

function openNewTab(link){
  window.open(link, "_blank");
}

function closePreview(){
  previewModal.style.display = "none";
  previewFrame.src = "";
}

function nextSlide(){
  currentIndex = (currentIndex + 1) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

function prevSlide(){
  currentIndex = (currentIndex - 1 + items.length) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

grid.addEventListener('click', function(e){
  const card = e.target.closest('.card');
  if(!card) return;
  const index = parseInt(card.dataset.index);
  if(e.target.classList.contains('previewBtn')){
    openPreview(items[index].link, index);
  } else if(e.target.classList.contains('openBtn')){
    openNewTab(items[index].link);
  } else if(e.target.classList.contains('editBtn')){
    const item = items[index];
    const newTitle = prompt("Edit PPT title:", item.title || "");
    if(newTitle !== null){
      db.collection("ppts").doc(item.id).update({ title: newTitle })
        .then(()=> { items[index].title = newTitle; render(); })
        .catch(err=>alert("Error updating: "+err));
    }
  } else if(e.target.classList.contains('deleteBtn')){
    const item = items[index];
    if(confirm("Are you sure you want to delete this PPT?")){
      db.collection("ppts").doc(item.id).delete()
        .then(()=> { items.splice(index,1); render(); })
        .catch(err=>alert("Error deleting: "+err));
    }
  }
});

// 🔥 DRAG & DROP EFFECT
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if(files.length) fileInput.files = files;
});

load();
</script>

</body>
</html>
