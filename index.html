<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Road+Rage&display=swap');

/* MAIN PAGE BACKGROUND */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:url("bg2.gif") repeat;
  background-size:cover;
}

/* LOGIN SCREEN BACKGROUND */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:url("bg1.gif") no-repeat center center/cover;
  z-index:10;
}

/* LOGOS */
.logo-top{
  position:absolute;
  top:20px;
  left:30px;
}
.logo-top img,
.nav-logo,
.mini-logo{
  filter: drop-shadow(0 0 10px orange);
  transition:0.3s;
}
.logo-top img{ width:200px; }
.nav-logo{ width:70px; }
.mini-logo{ width:80px; margin-bottom:10px; }

.logo-top img:hover,
.nav-logo:hover,
.mini-logo:hover{
  filter: drop-shadow(0 0 25px orange) drop-shadow(0 0 40px gold);
  transform:scale(1.05);
}

/* LOGIN BOX */
.login-box-modern{
  width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,255,0.2);
  transition:0.3s;
}
.login-box-modern:hover{
  box-shadow:0 0 50px rgba(0,255,255,0.5);
}

/* INPUT */
.login-box-modern input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.3);
  background:transparent;
  color:white;
}

/* BUTTON */
.login-box-modern button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px rgba(255,140,0,0.6);
  transition:0.3s;
}
.login-box-modern button:hover{
  box-shadow:0 0 25px rgba(255,140,0,1);
}

/* NAVBAR */
.navbar{
  padding:15px 30px;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
}
.nav-left{
  display:flex;
  align-items:center;
  gap:15px;
}

/* ROAD RAGE TITLE */
.nav-title{
  font-family:"Road Rage", sans-serif;
  font-size:2.8rem;
  letter-spacing:2px;
  color:#fff;
  text-shadow:
    0 0 5px #fff,
    0 0 10px #ff9800,
    0 0 20px #ff5722,
    0 0 40px #ff5722;
  animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse{
  from{
    text-shadow:
      0 0 5px #fff,
      0 0 10px #ff9800,
      0 0 20px #ff5722,
      0 0 40px #ff5722;
  }
  to{
    text-shadow:
      0 0 10px #fff,
      0 0 20px #ff9800,
      0 0 30px #ff5722,
      0 0 60px #ff5722;
  }
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px cyan, 0 0 40px rgba(0,255,255,0.5);
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-body{ padding:10px; }

/* BUTTONS */
.card-body button{
  padding:10px 14px;
  margin:5px 5px 0 0;
  border:none;
  border-radius:8px;
  font-size:0.85rem;
  cursor:pointer;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:999;
  justify-content:center;
  align-items:center;
}

/* UPLOADER */
.uploader {
  margin-bottom: 10px;
  padding: 30px;
  border: 2px dashed rgba(255,255,255,0.5);
  border-radius: 15px;
  text-align: center;
  background: rgba(255,255,255,0.05);
}

.addLinkContainer {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box-modern">
    <img src="logo.png" class="mini-logo">
    <h2>Sign In</h2>

    <input id="username" placeholder="Email">
    <input id="password" type="password">

    <button id="loginBtn">Sign In</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <img src="logo.png" class="nav-logo">
    <h2 class="nav-title">Temple of Learning</h2>
  </div>
</div>

<!-- MAIN -->
<div class="container">

<input type="text" id="searchInput" placeholder="🔍 Search PPT...">

<div class="uploader" id="dropZone">
  <p>📂 Drag & Drop PPT</p>
  <input type="file" id="fileInput">
</div>

<div class="addLinkContainer">
  <button onclick="addByLink()">Add Link</button>
</div>

<div id="grid" class="grid"></div>

</div>

<!-- MODAL -->
<div id="previewModal">
  <div style="width:85%; height:85%; background:#000; position:relative;">
    <button onclick="closePreview()" style="position:absolute; top:10px; right:10px;">❌</button>
    <iframe id="previewFrame" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<!-- 🔥 Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

/* 🔥 ONLY CHANGED PART */
loginBtn.onclick = ()=>{
  const email = username.value;
  const pass = password.value;

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=>{
    loginScreen.style.display="none";
  })
  .catch(()=>{
    error.style.display="block";
  });
};

/* REST UNCHANGED */
</script>

</body>
</html>
