<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
}

/* 🤖 AI BACKGROUND */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(rgba(10,15,28,0.8), rgba(10,15,28,0.9)),
    url('https://images.unsplash.com/photo-1677442136019-21780ecad995') center/cover no-repeat;

  overflow:hidden;
}

/* GRID (FIXED LAYER) */
#loginScreen::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  animation:moveGrid 20s linear infinite;
  z-index:0; /* 🔥 behind */
}

/* GLOW */
#loginScreen::after{
  content:"";
  position:absolute;
  width:600px;
  height:600px;
  background:radial-gradient(circle, rgba(0,255,255,0.2), transparent);
  top:-100px;
  left:-100px;
  animation:float 10s ease-in-out infinite alternate;
  z-index:0; /* 🔥 behind */
}

@keyframes moveGrid{
  from{ transform:translate(0,0); }
  to{ transform:translate(40px,40px); }
}

@keyframes float{
  from{ transform:translate(0,0); }
  to{ transform:translate(120px,100px); }
}

/* LOGO */
.logo-top{
  position:absolute;
  top:20px;
  left:30px;
  z-index:2;
}

.logo-top img{
  width:160px;
}

/* LOGIN BOX (ON TOP) */
.login-box-modern{
  position:relative;
  z-index:2; /* 🔥 THIS FIXES CLICK ISSUE */
  width:420px;
  padding:40px;
  border-radius:20px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(15px);
  box-shadow:0 20px 50px rgba(0,0,0,0.8);
  text-align:center;
  border:1px solid rgba(0,255,255,0.3);
}

/* HEADER */
.login-header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}

.mini-logo{
  width:35px;
}

/* INPUT */
.login-box-modern input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.3);
  background:transparent;
  color:white;
  outline:none;
}

/* BUTTON */
.login-box-modern button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.login-box-modern button:hover{
  transform:scale(1.05);
}
</style>
</head>

<body>

<div id="loginScreen">

  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box-modern">

    <div class="login-header">
      <img src="logo.png" class="mini-logo">
      <h2>Sign In</h2>
    </div>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn">Sign In</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>

  </div>

</div>

<script>
loginBtn.onclick=()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
  } else error.style.display="block";
};
</script>

</body>
</html>
