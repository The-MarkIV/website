<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STEM Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  overflow-x:hidden;
}

/* 🌌 Animated background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 30%, rgba(0,255,255,0.15), transparent),
             radial-gradient(circle at 80% 70%, rgba(0,255,150,0.15), transparent);
  z-index:-1;
}

/* Navbar */
.navbar{
  padding:15px 30px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

/* Container */
.container{ padding:30px; }

/* Search */
#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  outline:none;
}

/* Cards */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.1);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.25s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-body{ padding:10px; }

button{
  margin:5px;
  padding:8px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* Upload */
.uploader{
  border:2px dashed rgba(255,255,255,.3);
  padding:25px;
  text-align:center;
  border-radius:12px;
  margin-bottom:20px;
}

.uploader.dragover{
  background:rgba(0,255,255,0.1);
}

/* 🔐 LOGIN PAGE */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#141e30,#243b55);
}

.login-box{
  background:rgba(255,255,255,0.1);
  padding:35px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.login-box h2{
  margin-bottom:15px;
  color:#00eaff;
}

.login-box input{
  width:100%;
  margin:10px 0;
  padding:10px;
  border-radius:8px;
  border:none;
}

.login-box button{
  width:100%;
  padding:10px;
  background:linear-gradient(45deg,#00eaff,#00ff95);
  border:none;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>STEM LOGIN</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>
  </div>
</div>

<div class="navbar"><h2>STEM Dashboard</h2></div>

<div class="container">

<!-- SEARCH -->
<input type="text" id="searchInput" placeholder="🔍 Search PPT...">

<!-- UPLOADER -->
<div class="uploader" id="dropZone">
  <p>📂 Drag & Drop PPT here</p>
  <p>OR</p>
  <input type="file" id="fileInput">
  <p>OR</p>
  <button onclick="addByLink()">Add via OneDrive Link</button>
</div>

<div id="grid" class="grid"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAc7E2CeSwW9_uTi-yFnvlpMD2BMdPT53I",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning",
  storageBucket: "temple-of-learning.firebasestorage.app",
  messagingSenderId: "663049888458",
  appId: "1:663049888458:web:0914cdd63f99f319358a33"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items=[];

// LOGIN
document.getElementById("loginBtn").onclick = () => {
  if(
    document.getElementById("username").value==="admin" &&
    document.getElementById("password").value==="1234"
  ){
    document.getElementById("loginScreen").style.display="none";
  } else {
    document.getElementById("error").style.display="block";
  }
};

// LOAD
async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

// RENDER + SEARCH
function render(){
  const query = document.getElementById("searchInput").value.toLowerCase();

  document.getElementById("grid").innerHTML = items
    .filter(it => it.title.toLowerCase().includes(query))
    .map((it,i)=>`
  <div class="card" onclick="openFile('${it.link}')">
    <img src="https://source.unsplash.com/400x300/?technology">
    <div class="card-body">
      <h3>${it.title}</h3>
      <button onclick="event.stopPropagation(); edit(${i})">Edit</button>
      <button onclick="event.stopPropagation(); del(${i})">Delete</button>
    </div>
  </div>`).join("");
}

document.getElementById("searchInput").addEventListener("input", render);

// OPEN FILE
function openFile(link){
  window.open(link,"_blank");
}

// DRAG DROP
const dropZone = document.getElementById("dropZone");

dropZone.addEventListener("dragover", e=>{
  e.preventDefault();
  dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", ()=>{
  dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", e=>{
  e.preventDefault();
  dropZone.classList.remove("dragover");
  handleFile(e.dataTransfer.files[0]);
});

// FILE INPUT
document.getElementById("fileInput").onchange = e=>{
  handleFile(e.target.files[0]);
};

// HANDLE FILE
async function handleFile(file){
  if(!file) return;
  const title = file.name;
  const link = prompt("Paste OneDrive link:");
  if(!link) return;

  await db.collection("ppts").add({title,link});
  load();
}

// ADD BY LINK
async function addByLink(){
  const link = prompt("Paste OneDrive link:");
  const title = prompt("Enter title:");
  if(!link || !title) return;

  await db.collection("ppts").add({title,link});
  load();
}

// DELETE
async function del(i){
  await db.collection("ppts").doc(items[i].id).delete();
  load();
}

// EDIT
async function edit(i){
  const t = prompt("Title",items[i].title);
  const l = prompt("Link",items[i].link);
  if(!t || !l) return;

  await db.collection("ppts").doc(items[i].id).update({title:t,link:l});
  load();
}

load();
</script>

</body>
</html>
