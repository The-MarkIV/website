<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* VIDEO BACKGROUND */
#loginVideo, #mainVideo{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}
#mainVideo{ display:none; }

/* DARK OVERLAY */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.25);
  z-index:0;
}

/* BASE */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:#fff;
}

/* UI ABOVE VIDEO */
#loginScreen, #mainContent{
  position:relative;
  z-index:1;
}

/* LOGIN */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGO */
.logo-top{
  position:absolute;
  top:20px;
  left:30px;
}
.logo-top img{
  width:180px;
  filter: drop-shadow(0 0 15px orange);
}

/* LOGIN BOX */
.login-box-modern{
  width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  text-align:center;
}

/* INPUT */
.login-box-modern input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-bottom:1px solid #fff;
  background:transparent;
  color:#fff;
}

/* BUTTON */
.login-box-modern button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
}

/* NAVBAR */
.navbar{
  padding:15px 30px;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
}
.nav-logo{
  width:50px;
  margin-right:10px;
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
  backdrop-filter:blur(10px);
}
.card:hover{
  transform:scale(1.05);
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-body{ padding:10px; }

/* UPLOADER */
.uploader{
  border:2px dashed rgba(255,255,255,.3);
  padding:25px;
  text-align:center;
  border-radius:12px;
  margin-bottom:20px;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:999;
  justify-content:center;
  align-items:center;
}

</style>
</head>

<body>

<!-- 🎬 VIDEOS (FIXED CDN LINKS) -->
<video id="loginVideo" autoplay muted loop playsinline>
  <source src="https://cdn.jsdelivr.net/gh/The-MarkIV/website@main/bg1.mp4" type="video/mp4">
</video>

<video id="mainVideo" autoplay muted loop playsinline>
  <source src="https://cdn.jsdelivr.net/gh/The-MarkIV/website@main/bg2.mp4" type="video/mp4">
</video>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box-modern">
    <h2>Sign In</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password">
    <button id="loginBtn">Sign In</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>
  </div>
</div>

<!-- MAIN -->
<div id="mainContent" style="display:none;">

  <div class="navbar">
    <img src="logo.png" class="nav-logo">
    <h2>Temple of Learning</h2>
  </div>

  <div class="container">

    <input type="text" id="searchInput" placeholder="🔍 Search PPT...">

    <div class="uploader" id="dropZone">
      <p>📂 Drag & Drop PPT</p>
      <input type="file" id="fileInput">
      <button onclick="addByLink()">Add Link</button>
    </div>

    <div id="grid" class="grid"></div>

  </div>
</div>

<!-- PREVIEW MODAL -->
<div id="previewModal">
  <div style="width:85%; height:85%; background:#000; position:relative;">
    <button onclick="closePreview()" style="position:absolute; top:10px; right:10px;">❌</button>
    <iframe id="previewFrame" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

/* FORCE VIDEO PLAY */
window.onload = ()=>{
  loginVideo.play().catch(()=>{});
  mainVideo.play().catch(()=>{});
};

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items=[];

/* LOGIN */
loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
    mainContent.style.display="block";

    loginVideo.style.display="none";
    mainVideo.style.display="block";

    mainVideo.currentTime=0;
    mainVideo.play().catch(()=>{});

  } else error.style.display="block";
};

/* LOAD */
async function load(){
  const snap=await db.collection("ppts").get();
  items=snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

/* RENDER */
function render(){
  grid.innerHTML = items.map((it,i)=>`
    <div class="card">
      <img src="${it.thumbnail || 'https://via.placeholder.com/400'}">
      <div class="card-body">
        <h3>${it.title}</h3>
        <button onclick="openPreview('${it.link}')">Preview</button>
      </div>
    </div>
  `).join('');
}

/* PREVIEW */
function openPreview(link){
  previewModal.style.display="flex";
  previewFrame.src=link;
}
function closePreview(){
  previewModal.style.display="none";
}

/* ADD LINK */
function addByLink(){
  const link=prompt("Paste link:");
  const title=prompt("Title:");
  const thumb=prompt("Thumbnail:");

  db.collection("ppts").add({
    title:title||"Untitled",
    link:link||"#",
    thumbnail:thumb||""
  });

  load();
}

load();

</script>

</body>
</html>
