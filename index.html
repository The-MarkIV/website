<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* LOGIN SCREEN */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:#0f2027;
  z-index:10;
}

/* TOP LOGO */
.logo-top{
  position:absolute;
  top:20px;
  left:30px;
}

.logo-top img{
  width:180px;
  filter: drop-shadow(0 0 10px orange);
}

/* LOGIN BOX */
.login-box-modern{
  width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  text-align:center;
}

/* MINI LOGO */
.mini-logo{
  width:60px;
  margin-bottom:10px;
  filter: drop-shadow(0 0 8px orange);
}

/* INPUT */
.login-box-modern input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.3);
  background:transparent;
  color:white;
}

/* BUTTON */
.login-box-modern button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
}

.login-box-modern button:hover{
  transform:scale(1.05);
}

/* NAVBAR */
.navbar{
  padding:15px 30px;
  background:rgba(255,255,255,0.08);
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.1);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-body{ padding:10px; }

/* UPLOADER */
.uploader{
  border:2px dashed rgba(255,255,255,.3);
  padding:25px;
  text-align:center;
  border-radius:12px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">

  <!-- TOP LOGO -->
  <div class="logo-top">
    <img src="logo.png" alt="Temple Logo">
  </div>

  <div class="login-box-modern">

    <!-- MINI LOGO -->
    <img src="logo.png" class="mini-logo" alt="Logo">

    <h2>Sign In</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn">Sign In</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>

  </div>

</div>

<!-- MAIN -->
<div class="navbar"><h2>Temple of Learning</h2></div>

<div class="container">

<input type="text" id="searchInput" placeholder="🔍 Search PPT...">

<div class="uploader" id="dropZone">
  <p>📂 Drag & Drop PPT</p>
  <input type="file" id="fileInput">
  <button onclick="addByLink()">Add Link</button>
</div>

<div id="grid" class="grid"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];

/* LOGIN */
loginBtn.onclick = () => {
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
  } else {
    error.style.display="block";
  }
};

/* LOAD */
async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));

  console.log("DATA:", items);

  render();
}

/* RENDER (SAFE) */
function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(i => (i.title || "").toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card" onclick="window.open('${it.link || "#"}')">
    <img src="https://via.placeholder.com/400x300">
    <div class="card-body">
      <h3>${it.title || "Untitled"}</h3>
      <button onclick="event.stopPropagation();edit(${i})">Edit</button>
      <button onclick="event.stopPropagation();del(${i})">Delete</button>
    </div>
  </div>`).join('');
}

searchInput.oninput = render;

/* DELETE */
async function del(i){
  await db.collection("ppts").doc(items[i].id).delete();
  load();
}

/* EDIT */
async function edit(i){
  const t = prompt("Title", items[i].title);
  const l = prompt("Link", items[i].link);

  await db.collection("ppts").doc(items[i].id).update({
    title: t || "Untitled",
    link: l || "#"
  });

  load();
}

/* ADD FILE */
fileInput.onchange = e => {
  const file = e.target.files[0];
  const link = prompt("Paste OneDrive link:");

  db.collection("ppts").add({
    title: file?.name || "Untitled",
    link: link || "#"
  });

  load();
};

/* ADD LINK */
function addByLink(){
  const link = prompt("Paste link:");
  const title = prompt("Title:");

  db.collection("ppts").add({
    title: title || "Untitled",
    link: link || "#"
  });

  load();
}

/* DRAG */
dropZone.ondragover = e => e.preventDefault();

dropZone.ondrop = e => {
  e.preventDefault();

  const file = e.dataTransfer.files[0];
  const link = prompt("Paste link:");

  db.collection("ppts").add({
    title: file?.name || "Untitled",
    link: link || "#"
  });

  load();
};

load();
</script>

</body>
</html>
