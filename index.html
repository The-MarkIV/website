<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Road+Rage&display=swap" rel="stylesheet">

<style>

/* ===== BACKGROUNDS ===== */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:url("bg2.gif") repeat;
}

/* LOGIN PAGE (UNCHANGED) */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:url("bg1.gif") no-repeat center/cover;
  z-index:10;
}

/* LOGO */
.logo-top{
  position:absolute;
  top:20px;
  left:30px;
}
.logo-top img{ width:180px; }

/* LOGIN BOX */
.login-box-modern{
  width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  text-align:center;
}

.login-box-modern input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.3);
  background:transparent;
  color:white;
}

.login-box-modern button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
}

/* ===== NAVBAR ===== */
.navbar{
  padding:20px 30px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  gap:15px;
}

.nav-logo{ width:60px; }

/* 🔥 ROAD RAGE TITLE */
.nav-title{
  font-family: "Road Rage", cursive;
  font-size:40px;
  letter-spacing:2px;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 5px #fff,0 0 10px orange; }
  to{ text-shadow:0 0 15px #fff,0 0 30px orange; }
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px cyan;
}

.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}

.card-body{ padding:10px; }

/* 🔥 BUTTONS */
.btn-group{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
}

.btn{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
}

.preview-btn{ background:#00c6ff; color:#000; }
.open-btn{ background:#00ff95; color:#000; }
.edit-btn{ background:#ffc107; }
.delete-btn{ background:#ff4d4d; color:#fff; }

/* UPLOADER */
.uploader{
  border:2px dashed rgba(255,255,255,.3);
  padding:25px;
  text-align:center;
  border-radius:12px;
  margin-bottom:20px;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box-modern">
    <h2>Sign In</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password">
    <button id="loginBtn">Sign In</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <img src="logo.png" class="nav-logo">
  <h2 class="nav-title">Temple of Learning</h2>
</div>

<!-- MAIN -->
<div class="container">

<input type="text" id="searchInput" placeholder="🔍 Search PPT...">

<div class="uploader" id="dropZone">
  <p>📂 Drag & Drop PPT</p>
  <input type="file" id="fileInput">
  <button onclick="addByLink()">Add Link</button>
</div>

<div id="grid" class="grid"></div>

</div>

<!-- MODAL -->
<div id="previewModal">
  <div style="width:85%; height:85%; background:#000; position:relative;">
    <button onclick="closePreview()" style="position:absolute; top:10px; right:10px;">❌</button>
    <button onclick="prevSlide()" style="position:absolute; left:10px; top:50%;">⬅️</button>
    <button onclick="nextSlide()" style="position:absolute; right:10px; top:50%;">➡️</button>
    <iframe id="previewFrame" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;

loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
  } else error.style.display="block";
};

async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(i => (i.title || "").toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card">
    <img src="${it.thumbnail || 'https://via.placeholder.com/400x300'}">
    <div class="card-body">
      <h3>${it.title || "Untitled"}</h3>

      <div class="btn-group">
        <button class="btn preview-btn" onclick="openPreview('${it.link}',${i})">Preview</button>
        <button class="btn open-btn" onclick="openNewTab('${it.link}')">Open</button>
        <button class="btn edit-btn" onclick="edit(${i})">Edit</button>
        <button class="btn delete-btn" onclick="del(${i})">Delete</button>
      </div>

    </div>
  </div>
  `).join('');
}

searchInput.oninput = render;

function openPreview(link,index){
  currentIndex = index;
  previewModal.style.display="flex";
  previewFrame.src = link;
}

function openNewTab(link){
  window.open(link,"_blank");
}

function closePreview(){
  previewModal.style.display="none";
}

function nextSlide(){
  currentIndex=(currentIndex+1)%items.length;
  openPreview(items[currentIndex].link,currentIndex);
}

function prevSlide(){
  currentIndex=(currentIndex-1+items.length)%items.length;
  openPreview(items[currentIndex].link,currentIndex);
}

async function del(i){
  await db.collection("ppts").doc(items[i].id).delete();
  load();
}

async function edit(i){
  const t=prompt("Title",items[i].title);
  const l=prompt("Link",items[i].link);

  await db.collection("ppts").doc(items[i].id).update({
    title:t||"Untitled",
    link:l||"#"
  });

  load();
}

function addByLink(){
  const link=prompt("Link:");
  const title=prompt("Title:");

  db.collection("ppts").add({
    title:title||"Untitled",
    link:link||"#"
  });

  load();
}

load();

</script>

</body>
</html>
