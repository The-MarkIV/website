<!DOCTYPE html>
<html lang=\"en\">
<head>
<meta charset=\"UTF-8\">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
<title>Temple of Learning</title>

<link href=\"https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap\" rel=\"stylesheet\">

<style>

/* MAIN PAGE BACKGROUND */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  background-size: 200% 200%;
  animation: gradientShift 10s ease infinite;
  min-height: 100vh;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* LOGIN SCREEN BACKGROUND */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  background-size: 200% 200%;
  animation: gradientShift 8s ease infinite;
  z-index:10;
}

/* LOGO TEXT */
.logo-top{
  position:absolute;
  top:20px;
  left:30px;
}

.logo-text, .nav-logo-text, .mini-logo-text {
  font-size: 28px;
  font-weight: 600;
  background: linear-gradient(45deg, #ff9800, #ffc107);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 0 30px rgba(255, 152, 0, 0.5);
  filter: drop-shadow(0 0 10px rgba(255, 152, 0, 0.8));
  transition:0.3s;
  cursor: pointer;
}

.mini-logo-text {
  font-size: 42px;
  margin-bottom: 20px;
  display: inline-block;
}

.nav-logo-text {
  font-size: 24px;
}

.logo-text:hover,
.nav-logo-text:hover {
  filter: drop-shadow(0 0 20px rgba(255, 152, 0, 1));
  transform:scale(1.05);
}

/* LOGIN BOX */
.login-box-modern{
  width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,255,0.3);
  transition:0.3s;
  border: 1px solid rgba(255,255,255,0.2);
}

.login-box-modern:hover{
  box-shadow:0 0 50px rgba(0,255,255,0.5);
}

.login-box-modern h2 {
  margin-bottom: 25px;
  font-size: 28px;
}

/* INPUT */
.login-box-modern input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-bottom:2px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.05);
  color:white;
  font-size: 14px;
  border-radius: 5px;
  transition: 0.3s;
}

.login-box-modern input::placeholder {
  color: rgba(255,255,255,0.6);
}

.login-box-modern input:focus {
  outline: none;
  background:rgba(255,255,255,0.1);
  border-bottom-color: #ff9800;
}

/* BUTTON */
.login-box-modern button{
  width:100%;
  padding:12px;
  margin-top: 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  font-weight: 600;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,140,0,0.6);
  transition:0.3s;
}

.login-box-modern button:hover{
  box-shadow:0 0 30px rgba(255,140,0,1);
  transform: translateY(-2px);
}

/* NAVBAR */
.navbar{
  padding:15px 30px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  display:flex;
  align-items:center;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.nav-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.nav-left h2 {
  font-size: 22px;
  margin: 0;
}

/* MAIN */
.container{ 
  padding:30px;
  max-width: 1400px;
  margin: 0 auto;
}

#searchInput{
  width:100%;
  padding:15px;
  margin-bottom:20px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  color: white;
  font-size: 15px;
}

#searchInput::placeholder {
  color: rgba(255,255,255,0.7);
}

#searchInput:focus {
  outline: none;
  border-color: #ff9800;
  background:rgba(255,255,255,0.15);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.1);
  border-radius:15px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 0 30px rgba(0,255,255,0.5), 0 8px 25px rgba(0,0,0,0.2);
  border-color: rgba(0,255,255,0.5);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
}

.card-body{ 
  padding:15px;
}

.card-body h3 {
  margin: 0 0 12px 0;
  font-size: 18px;
  font-weight: 600;
}

.card-body button {
  padding: 8px 14px;
  margin: 4px 2px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  font-size: 13px;
  transition: 0.3s;
  border: 1px solid rgba(255,255,255,0.2);
}

.card-body button:hover {
  background: rgba(255,255,255,0.25);
  transform: translateY(-2px);
}

/* UPLOADER */
.uploader{
  border:2px dashed rgba(255,255,255,0.4);
  padding:30px;
  text-align:center;
  border-radius:15px;
  margin-bottom:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.uploader:hover {
  border-color: #ff9800;
  background:rgba(255,255,255,0.1);
}

.uploader p {
  font-size: 16px;
  margin-bottom: 15px;
  font-weight: 500;
}

.uploader input[type=\"file\"] {
  margin: 10px 0;
}

.uploader button {
  padding: 10px 25px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(45deg, #667eea, #764ba2);
  color: white;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
  box-shadow: 0 4px 15px rgba(102,126,234,0.4);
}

.uploader button:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102,126,234,0.6);
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  z-index:999;
  justify-content:center;
  align-items:center;
}

.modal-content {
  width: 90%;
  height: 90%;
  background: #000;
  position: relative;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.modal-btn {
  position: absolute;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 12px 18px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 20px;
  transition: 0.3s;
  z-index: 10;
}

.modal-btn:hover {
  background: rgba(255,255,255,0.3);
  transform: scale(1.1);
}

.close-btn {
  top: 15px;
  right: 15px;
}

.prev-btn {
  left: 15px;
  top: 50%;
  transform: translateY(-50%);
}

.next-btn {
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id=\"loginScreen\">
  <div class=\"logo-top\">
    <div class=\"logo-text\">🏛️ Temple of Learning</div>
  </div>

  <div class=\"login-box-modern\">
    <div class=\"mini-logo-text\">📚</div>
    <h2>Sign In</h2>

    <input id=\"username\" placeholder=\"Username\">
    <input id=\"password\" type=\"password\" placeholder=\"Password\">

    <button id=\"loginBtn\">Sign In</button>
    <p id=\"error\" style=\"color:#ff6b6b;display:none;margin-top:10px;\">❌ Wrong login</p>
  </div>
</div>

<!-- NAVBAR -->
<div class=\"navbar\">
  <div class=\"nav-left\">
    <div class=\"nav-logo-text\">🏛️</div>
    <h2>Temple of Learning</h2>
  </div>
</div>

<!-- MAIN -->
<div class=\"container\">

<input type=\"text\" id=\"searchInput\" placeholder=\"🔍 Search PPT...\">

<div class=\"uploader\" id=\"dropZone\">
  <p>📂 Drag & Drop PPT</p>
  <input type=\"file\" id=\"fileInput\">
  <button onclick=\"addByLink()\">Add Link</button>
</div>

<div id=\"grid\" class=\"grid\"></div>

</div>

<!-- MODAL -->
<div id=\"previewModal\">
  <div class=\"modal-content\">
    <button class=\"modal-btn close-btn\" onclick=\"closePreview()\">✕</button>
    <button class=\"modal-btn prev-btn\" onclick=\"prevSlide()\">‹</button>
    <button class=\"modal-btn next-btn\" onclick=\"nextSlide()\">›</button>
    <iframe id=\"previewFrame\" style=\"width:100%; height:100%; border:none;\"></iframe>
  </div>
</div>

<script src=\"https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js\"></script>
<script src=\"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js\"></script>

<script>

const firebaseConfig = {
  apiKey: \"AIzaSy...\",
  authDomain: \"temple-of-learning.firebaseapp.com\",
  projectId: \"temple-of-learning\"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;

loginBtn.onclick = function(){
  if(username.value===\"admin\" && password.value===\"1234\"){
    loginScreen.style.display=\"none\";
  } else {
    error.style.display=\"block\";
  }
};

async function load(){
  const snap = await db.collection(\"ppts\").get();
  items = snap.docs.map(function(d){ return {id:d.id,...d.data()} });
  render();
}

function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(function(i){ return (i.title || \"\").toLowerCase().includes(q) })
  .map(function(it,i){
    return '<div class=\"card\">' +
    '<img src=\"' + (it.thumbnail || 'https://images.unsplash.com/photo-1524178232363-1fb2b075b655?w=400&h=300&fit=crop') + '\">' +
    '<div class=\"card-body\">' +
    '<h3>' + (it.title || \"Untitled\") + '</h3>' +
    '<button onclick=\"openPreview(\'' + it.link + '\', ' + i + ')\">👁️ Preview</button>' +
    '<button onclick=\"openNewTab(\'' + it.link + '\')\">🔗 Open</button>' +
    '<button onclick=\"edit(' + i + ')\">✏️ Edit</button>' +
    '<button onclick=\"del(' + i + ')\">🗑️ Delete</button>' +
    '</div>' +
    '</div>';
  }).join('');
}

searchInput.oninput = render;

function getEmbedLink(link){
  if(link.includes(\"docs.google.com/presentation\")){
    return link.replace(\"/edit\",\"/embed\").replace(\"/view\",\"/embed\");
  }
  if(link.includes(\"drive.google.com\")){
    const id = link.match(/[-\w]{25,}/);
    if(id) return \"https://drive.google.com/file/d/\" + id[0] + \"/preview\";
  }
  if(link.includes(\"onedrive\") || link.includes(\"sharepoint\")){
    return link + \"&action=embedview\";
  }
  return link;
}

function openPreview(link,index){
  currentIndex = index;
  const embedLink = getEmbedLink(link);
  previewModal.style.display = \"flex\";
  previewFrame.src = embedLink;
}

function openNewTab(link){
  window.open(link, \"_blank\");
}

function closePreview(){
  previewModal.style.display = \"none\";
  previewFrame.src = \"\";
}

function nextSlide(){
  if(items.length === 0) return;
  currentIndex = (currentIndex + 1) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

function prevSlide(){
  if(items.length === 0) return;
  currentIndex = (currentIndex - 1 + items.length) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

document.addEventListener(\"keydown\", function(e){
  if(previewModal.style.display === \"flex\"){
    if(e.key === \"ArrowRight\" || e.key === \" \"){
      e.preventDefault();
      nextSlide();
    }
    if(e.key === \"ArrowLeft\"){
      prevSlide();
    }
    if(e.key === \"Escape\"){
      closePreview();
    }
    if(e.key === \"Enter\"){
      toggleFullscreen();
    }
  }
});

function toggleFullscreen(){
  const elem = previewModal;
  if (!document.fullscreenElement){
    elem.requestFullscreen().catch(function(err){ console.log(err) });
  } else {
    document.exitFullscreen();
  }
}

let startX = 0;

previewModal.addEventListener(\"touchstart\", function(e){
  startX = e.touches[0].clientX;
});

previewModal.addEventListener(\"touchend\", function(e){
  let endX = e.changedTouches[0].clientX;
  if(startX - endX > 50) nextSlide();
  if(endX - startX > 50) prevSlide();
});

async function del(i){
  if(confirm('Delete this presentation?')) {
    await db.collection(\"ppts\").doc(items[i].id).delete();
    load();
  }
}

async function edit(i){
  const t = prompt(\"Title\", items[i].title);
  const l = prompt(\"Link\", items[i].link);
  const th = prompt(\"Thumbnail\", items[i].thumbnail || \"\");

  await db.collection(\"ppts\").doc(items[i].id).update({
    title: t || \"Untitled\",
    link: l || \"#\",
    thumbnail: th || \"\"
  });

  load();
}

fileInput.onchange = function(e){
  const file = e.target.files[0];
  const link = prompt(\"Paste link:\");
  const thumb = prompt(\"Thumbnail link:\");

  db.collection(\"ppts\").add({
    title: file ? file.name : \"Untitled\",
    link: link || \"#\",
    thumbnail: thumb || \"\"
  });

  load();
};

function addByLink(){
  const link = prompt(\"Paste link:\");
  const title = prompt(\"Title:\");
  const thumb = prompt(\"Thumbnail link:\");

  db.collection(\"ppts\").add({
    title: title || \"Untitled\",
    link: link || \"#\",
    thumbnail: thumb || \"\"
  });

  load();
}

dropZone.ondragover = function(e){ e.preventDefault(); };

dropZone.ondrop = function(e){
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  const link = prompt(\"Paste link:\");
  const thumb = prompt(\"Thumbnail link:\");

  db.collection(\"ppts\").add({
    title: file ? file.name : \"Untitled\",
    link: link || \"#\",
    thumbnail: thumb || \"\"
  });

  load();
};

load();

</script>

</body>
</html>
