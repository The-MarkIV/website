<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* MAIN PAGE BACKGROUND */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:url("bg2.gif") repeat center;
  background-size:cover;
}

/* LOGIN SCREEN (PREMIUM RESTORED) */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;

  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
    url("bg1.gif") repeat center;

  background-size:cover;
  z-index:1000;
}

/* LOGOS */
.logo-top{
  position:absolute;
  top:30px;
  left:30px;
}
.logo-top img{
  width:220px;
  filter: drop-shadow(0 0 25px orange) drop-shadow(0 0 50px gold);
}

.mini-logo{
  width:100px;
  margin-bottom:20px;
}

/* LOGIN BOX */
.login-box{
  width:420px;
  padding:50px 40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  box-shadow:0 0 40px rgba(0,255,255,0.3);
  text-align:center;
}

/* INPUT */
.input-group input{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* BUTTON */
.login-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
}

/* NAVBAR */
.navbar{
  padding:15px 30px;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-logo{
  width:60px;
}

.nav-title{
  font-size:1.8rem;
}

/* MAIN */
.container{ padding:30px; }

/* SEARCH */
#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px cyan, 0 0 40px rgba(0,255,255,0.5);
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-body{ padding:10px; }

/* BUTTONS (RESTORED) */
.card-actions{
  display:flex;
  flex-wrap:wrap;
}

.btn{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  margin:3px;
  cursor:pointer;
}

.btn-primary{ background:#4facfe; color:white; }
.btn-success{ background:#56ab2f; color:white; }
.btn-warning{ background:#f7971e; color:black; }
.btn-danger{ background:#ff416c; color:white; }

/* UPLOADER */
.uploader{
  border:2px dashed rgba(255,255,255,.3);
  padding:25px;
  text-align:center;
  border-radius:12px;
  margin-bottom:20px;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  z-index:999;
  justify-content:center;
  align-items:center;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box">
    <img src="logo.png" class="mini-logo">
    <h2>Welcome Back</h2>

    <div class="input-group">
      <input id="username" placeholder="Username">
    </div>

    <div class="input-group">
      <input id="password" type="password" placeholder="Password">
    </div>

    <button id="loginBtn" class="login-btn">Enter Temple</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <img src="logo.png" class="nav-logo">
    <div class="nav-title">Temple of Learning</div>
  </div>
</div>

<!-- MAIN -->
<div class="container">

<input type="text" id="searchInput" placeholder="🔍 Search PPT...">

<div class="uploader" id="dropZone">
  <p>📂 Drag & Drop PPT</p>
  <input type="file" id="fileInput">
  <button onclick="addByLink()">Add Link</button>
</div>

<div id="grid" class="grid"></div>

</div>

<!-- MODAL -->
<div id="previewModal">
  <div style="width:85%; height:85%; background:#000; position:relative;">
    <button onclick="closePreview()" style="position:absolute; top:10px; right:10px;">❌</button>
    <button onclick="prevSlide()" style="position:absolute; left:10px; top:50%;">⬅️</button>
    <button onclick="nextSlide()" style="position:absolute; right:10px; top:50%;">➡️</button>
    <iframe id="previewFrame" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;

/* LOGIN */
loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
  } else error.style.display="block";
};

async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(i => (i.title || "").toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card">
    <img src="${it.thumbnail || 'https://via.placeholder.com/400x300'}">
    <div class="card-body">
      <h3>${it.title || "Untitled"}</h3>
      <div class="card-actions">
        <button class="btn btn-primary" onclick="openPreview('${it.link}', ${i})">Preview</button>
        <button class="btn btn-success" onclick="openNewTab('${it.link}')">Open</button>
        <button class="btn btn-warning" onclick="edit(${i})">Edit</button>
        <button class="btn btn-danger" onclick="del(${i})">Delete</button>
      </div>
    </div>
  </div>`).join('');
}

searchInput.oninput = render;

function getEmbedLink(link){
  if(link.includes("docs.google.com/presentation")){
    return link.replace("/edit","/embed").replace("/view","/embed");
  }
  if(link.includes("drive.google.com")){
    const id = link.match(/[-\w]{25,}/);
    if(id) return `https://drive.google.com/file/d/${id[0]}/preview`;
  }
  return link;
}

function openPreview(link,index){
  currentIndex = index;
  previewModal.style.display = "flex";
  previewFrame.src = getEmbedLink(link);
}

function openNewTab(link){
  window.open(link, "_blank");
}

function closePreview(){
  previewModal.style.display = "none";
  previewFrame.src = "";
}

function nextSlide(){
  currentIndex = (currentIndex + 1) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

function prevSlide(){
  currentIndex = (currentIndex - 1 + items.length) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

async function del(i){
  await db.collection("ppts").doc(items[i].id).delete();
  load();
}

async function edit(i){
  const t = prompt("Title", items[i].title);
  const l = prompt("Link", items[i].link);
  const th = prompt("Thumbnail", items[i].thumbnail || "");

  await db.collection("ppts").doc(items[i].id).update({
    title: t || "Untitled",
    link: l || "#",
    thumbnail: th || ""
  });

  load();
}

fileInput.onchange = e=>{
  const file = e.target.files[0];
  const link = prompt("Paste link:");
  const thumb = prompt("Thumbnail link:");

  db.collection("ppts").add({
    title: file?.name || "Untitled",
    link: link || "#",
    thumbnail: thumb || ""
  });

  load();
};

function addByLink(){
  const link = prompt("Paste link:");
  const title = prompt("Title:");
  const thumb = prompt("Thumbnail link:");

  db.collection("ppts").add({
    title: title || "Untitled",
    link: link || "#",
    thumbnail: thumb || ""
  });

  load();
}

dropZone.ondragover = e=>e.preventDefault();

dropZone.ondrop = e=>{
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  const link = prompt("Paste link:");
  const thumb = prompt("Thumbnail link:");

  db.collection("ppts").add({
    title: file?.name || "Untitled",
    link: link || "#",
    thumbnail: thumb || ""
  });

  load();
};

load();

</script>

</body>
</html>
