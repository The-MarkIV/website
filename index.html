<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Road+Rage&display=swap');

/* GLOBAL */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:url("bg2.gif") repeat;
  background-size:cover;
}

/* LOGIN PAGE (RESTORED PREMIUM) */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:url("bg1.gif") no-repeat center center/cover;
  z-index:1000;
}

.login-box{
  width:420px;
  padding:50px;
  border-radius:20px;
  text-align:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(20px);
  animation:fadeIn 1s ease;
}

.login-box h2{
  font-size:2rem;
  margin-bottom:20px;
}

.login-box input{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

.login-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
}

#error{
  color:red;
  display:none;
}

/* NAVBAR */
.navbar{
  padding:20px 30px;
  display:flex;
  align-items:center;
  gap:15px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.nav-logo{
  width:70px;
}

/* TITLE FONT + ANIMATION */
.nav-title{
  font-family:'Road Rage', cursive;
  font-size:3rem;
  letter-spacing:3px;
  color:#fff;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 10px #ff9800; }
  to{ text-shadow:0 0 30px #ff5722,0 0 60px orange; }
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:15px;
  border-radius:10px;
  border:none;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-body{ padding:10px; }

/* UPLOADER */
.uploader{
  border:2px dashed rgba(255,255,255,.3);
  padding:25px;
  text-align:center;
  border-radius:12px;
  margin-bottom:20px;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:999;
  justify-content:center;
  align-items:center;
}

@keyframes fadeIn{
  from{opacity:0;}
  to{opacity:1;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>Welcome Back</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password">
    <button id="loginBtn" class="login-btn">Enter</button>
    <p id="error">Wrong login</p>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <img src="logo.png" class="nav-logo">
  <div class="nav-title">Temple of Learning</div>
</div>

<!-- MAIN -->
<div class="container">

<input type="text" id="searchInput" placeholder="🔍 Search PPT...">

<div class="uploader" id="dropZone">
  <p>📂 Drag & Drop PPT</p>
  <input type="file" id="fileInput">
  <button onclick="addByLink()">Add Link</button>
</div>

<div id="grid" class="grid"></div>

</div>

<!-- MODAL -->
<div id="previewModal">
  <div style="width:85%; height:85%; background:#000; position:relative;">
    <button onclick="closePreview()" style="position:absolute; top:10px; right:10px;">❌</button>
    <button onclick="prevSlide()" style="position:absolute; left:10px; top:50%;">⬅️</button>
    <button onclick="nextSlide()" style="position:absolute; right:10px; top:50%;">➡️</button>
    <iframe id="previewFrame" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;

/* LOGIN FIXED */
loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
  } else {
    error.style.display="block";
  }
};

/* LOAD */
async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

/* RENDER FIXED */
function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(i => (i.title || "").toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card">
    <img src="${it.thumbnail || 'https://via.placeholder.com/400x300'}">
    <div class="card-body">
      <h3>${it.title || "Untitled"}</h3>
      <button onclick="openPreview('${it.link}', ${i})">Preview</button>
      <button onclick="openNewTab('${it.link}')">Open</button>
      <button onclick="edit(${i})">Edit</button>
      <button onclick="del(${i})">Delete</button>
    </div>
  </div>`).join('');
}

searchInput.oninput = render;

/* FIXED EMBED */
function getEmbedLink(link){
  if(link.includes("docs.google.com/presentation")){
    return link.replace("/edit","/embed");
  }
  if(link.includes("drive.google.com")){
    const id = link.match(/[-\w]{25,}/);
    if(id) return `https://drive.google.com/file/d/${id[0]}/preview`;
  }
  return link;
}

function openPreview(link,index){
  currentIndex = index;
  previewModal.style.display = "flex";
  previewFrame.src = getEmbedLink(link);
}

function openNewTab(link){
  window.open(link, "_blank");
}

function closePreview(){
  previewModal.style.display = "none";
  previewFrame.src = "";
}

function nextSlide(){
  currentIndex = (currentIndex + 1) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

function prevSlide(){
  currentIndex = (currentIndex - 1 + items.length) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

/* ADD / DELETE / EDIT */
async function del(i){
  await db.collection("ppts").doc(items[i].id).delete();
  load();
}

async function edit(i){
  const t = prompt("Title", items[i].title);
  const l = prompt("Link", items[i].link);
  const th = prompt("Thumbnail", items[i].thumbnail || "");

  await db.collection("ppts").doc(items[i].id).update({
    title: t || "Untitled",
    link: l || "#",
    thumbnail: th || ""
  });

  load();
}

function addByLink(){
  const link = prompt("Paste link:");
  const title = prompt("Title:");
  const thumb = prompt("Thumbnail link:");

  db.collection("ppts").add({
    title: title || "Untitled",
    link: link || "#",
    thumbnail: thumb || ""
  });

  load();
}

load();

</script>

</body>
</html>
