<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Road+Rage&display=swap');

/* MAIN PAGE BACKGROUND */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:url("bg2.gif") repeat;
  background-size:cover;
}

/* NAVBAR */
.navbar{
  padding:15px 30px;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
}
.nav-left{
  display:flex;
  align-items:center;
  gap:15px;
}

/* TITLE */
.nav-title{
  font-family:"Road Rage", sans-serif;
  font-size:2.8rem;
  letter-spacing:2px;
  color:#fff;
  text-shadow:
    0 0 5px #fff,
    0 0 10px #ff9800,
    0 0 20px #ff5722,
    0 0 40px #ff5722;
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px cyan, 0 0 40px rgba(0,255,255,0.5);
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-body{ padding:10px; }

/* BUTTONS */
.card-body button{
  padding:10px 14px;
  margin:5px 5px 0 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:999;
  justify-content:center;
  align-items:center;
}

/* UPLOADER */
.uploader {
  margin-bottom: 10px;
  padding: 30px;
  border: 2px dashed rgba(255,255,255,0.5);
  border-radius: 15px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  cursor:pointer;
}

.uploader.dragover {
  border-color: #00ffff;
}

.uploader input {
  display:none;
}

.addLinkContainer {
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.addLinkContainer button{
  padding:12px 25px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <img src="logo.png" style="width:70px;">
    <h2 class="nav-title">Temple of Learning</h2>
  </div>
</div>

<!-- MAIN -->
<div class="container">

<input type="text" id="searchInput" placeholder="🔍 Search PPT...">

<div class="uploader" id="dropZone">
  <p>📂 Drag & Drop PPT</p>
  <input type="file" id="fileInput">
</div>

<div class="addLinkContainer">
  <button onclick="addByLink()">Add Link</button>
</div>

<div id="grid" class="grid"></div>

</div>

<!-- MODAL -->
<div id="previewModal">
  <div style="width:85%; height:85%; background:#000; position:relative;">
    <button onclick="closePreview()" style="position:absolute; top:10px; right:10px;">❌</button>
    <iframe id="previewFrame" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAc7E2CeSwW9_uTi-yFnvlpMD2BMdPT53I",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

/* 🔐 PROTECT PAGE */
auth.onAuthStateChanged(user => {
  if(!user){
    window.location.href = "login.html";
  }
});

/* APP LOGIC */
let items = [];
let currentIndex = 0;

async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(i => (i.title || "").toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card" data-index="${i}">
    <img src="${it.thumbnail || 'https://via.placeholder.com/400x300'}">
    <div class="card-body">
      <h3>${it.title || "Untitled"}</h3>
      <button class="previewBtn">Preview</button>
      <button class="openBtn">Open</button>
      <button class="editBtn">Edit</button>
      <button class="deleteBtn">Delete</button>
    </div>
  </div>`).join('');
}

searchInput.oninput = render;

function getEmbedLink(link){
  if(link.includes("docs.google.com/presentation")){
    return link.replace("/edit","/embed").replace("/view","/embed");
  }
  if(link.includes("onedrive.live.com")){
    return link.includes("?") ? link.split("?")[0] + "?embed" : link + "?embed";
  }
  return link;
}

function openPreview(link,index){
  currentIndex = index;
  previewModal.style.display = "flex";
  previewFrame.src = getEmbedLink(link);
}

function openNewTab(link){
  window.open(link, "_blank");
}

function closePreview(){
  previewModal.style.display = "none";
  previewFrame.src = "";
}

/* BUTTON HANDLING */
grid.addEventListener('click', function(e){
  const card = e.target.closest('.card');
  if(!card) return;
  const index = parseInt(card.dataset.index);

  if(e.target.classList.contains('previewBtn')){
    openPreview(items[index].link, index);
  }
  else if(e.target.classList.contains('openBtn')){
    openNewTab(items[index].link);
  }
  else if(e.target.classList.contains('editBtn')){
    const item = items[index];
    const newTitle = prompt("Edit title:", item.title);
    if(newTitle){
      db.collection("ppts").doc(item.id).update({title:newTitle});
      load();
    }
  }
  else if(e.target.classList.contains('deleteBtn')){
    const item = items[index];
    if(confirm("Delete?")){
      db.collection("ppts").doc(item.id).delete();
      load();
    }
  }
});

/* ADD LINK */
function addByLink(){
  let link = prompt("Enter Google Slides / OneDrive link:");
  if(!link) return;

  const title = prompt("Title:") || "Untitled";

  db.collection("ppts").add({
    title: title,
    link: link,
    thumbnail: "https://via.placeholder.com/400x300"
  });

  load();
}

/* DRAG DROP */
dropZone.onclick = ()=>fileInput.click();

dropZone.ondragover = e=>{
  e.preventDefault();
  dropZone.classList.add("dragover");
};

dropZone.ondragleave = ()=>dropZone.classList.remove("dragover");

dropZone.ondrop = e=>{
  e.preventDefault();
  dropZone.classList.remove("dragover");
};

load();
</script>

</body>
</html>
