<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Inter',sans-serif;
  margin:0;
  background:#0a0a0a;
  color:#fff;
}

/* macOS Dock */
.dock{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  padding:10px 20px;
  border-radius:20px;
  display:flex;
  gap:15px;
}

.dock div{
  width:40px;
  height:40px;
  background:rgba(255,255,255,0.15);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s;
}

.dock div:hover{
  transform:scale(1.2);
}

/* Window style */
.window{
  margin:40px;
  border-radius:20px;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
}

.titlebar{
  padding:10px;
  display:flex;
  gap:8px;
}

.circle{width:12px;height:12px;border-radius:50%;}
.red{background:#ff5f57}
.yellow{background:#ffbd2e}
.green{background:#28c840}

.container{ padding:20px; }

#searchInput{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:white;
  margin-bottom:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{transform:scale(1.05)}

.card img{width:100%;height:150px;object-fit:cover}
.card-body{padding:10px}

button{
  margin-top:5px;
  padding:6px 10px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* Login */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:black;
}

.login-box{
  background:rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(20px);
}

.login-box input{
  width:100%;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  border:none;
}

</style>
</head>

<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>Temple of Learning</h2>
    <p style="opacity:0.7;font-size:12px;">Dashboard</p>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button id="loginBtn">Login</button>
  </div>
</div>

<div class="window">
  <div class="titlebar">
    <div class="circle red"></div>
    <div class="circle yellow"></div>
    <div class="circle green"></div>
  </div>

  <div class="container">
    <input type="text" id="searchInput" placeholder="Search Temple of Learning...">

    <div id="grid" class="grid"></div>
  </div>
</div>

<div class="dock">
  <div>📁</div>
  <div>🔍</div>
  <div>⚙️</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAc7E2CeSwW9_uTi-yFnvlpMD2BMdPT53I",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning",
  storageBucket: "temple-of-learning.firebasestorage.app",
  messagingSenderId: "663049888458",
  appId: "1:663049888458:web:0914cdd63f99f319358a33"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items=[];

loginBtn.onclick=()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
  }
}

async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

function render(){
  const q = searchInput.value.toLowerCase();
  grid.innerHTML = items
  .filter(i=>i.title.toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card" onclick="window.open('${it.link}')">
    <img src="https://source.unsplash.com/400x300/?tech">
    <div class="card-body">
      <h3>${it.title}</h3>
      <button onclick="event.stopPropagation();edit(${i})">Edit</button>
      <button onclick="event.stopPropagation();del(${i})">Delete</button>
    </div>
  </div>`).join('');
}

searchInput.oninput=render;

async function del(i){
  await db.collection("ppts").doc(items[i].id).delete();
  load();
}

async function edit(i){
  const t=prompt("Title",items[i].title);
  const l=prompt("Link",items[i].link);
  await db.collection("ppts").doc(items[i].id).update({title:t,link:l});
  load();
}

load();
</script>

</body>
</html>
