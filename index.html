<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* VIDEO BACKGROUND */
#loginVideo, #mainVideo{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  pointer-events:none; /* 🔥 FIX */
}
#mainVideo{ display:none; }

/* DARK OVERLAY */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.3);
  z-index:0;
  pointer-events:none; /* 🔥 FIX */
}

/* BASE */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
}

/* ENSURE UI ABOVE */
#loginScreen, #mainContent, .navbar, .container{
  position:relative;
  z-index:1;
}

/* LOGIN */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* LOGOS */
.logo-top{
  position:absolute;
  top:20px;
  left:30px;
}
.logo-top img,
.nav-logo,
.mini-logo{
  filter: drop-shadow(0 0 10px orange);
  transition:0.3s;
}
.logo-top img{ width:180px; }
.nav-logo{ width:50px; }
.mini-logo{ width:60px; margin-bottom:10px; }

.logo-top img:hover,
.nav-logo:hover,
.mini-logo:hover{
  filter: drop-shadow(0 0 25px orange) drop-shadow(0 0 40px gold);
  transform:scale(1.05);
}

/* LOGIN BOX */
.login-box-modern{
  width:400px;
  padding:40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  text-align:center;
  box-shadow:0 0 30px rgba(0,255,255,0.2);
}

/* INPUT */
.login-box-modern input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-bottom:1px solid rgba(255,255,255,0.3);
  background:transparent;
  color:white;
}

/* BUTTON */
.login-box-modern button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px rgba(255,140,0,0.6);
}

/* NAVBAR */
.navbar{
  padding:15px 30px;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
}
.nav-left{
  display:flex;
  align-items:center;
  gap:10px;
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px cyan, 0 0 40px rgba(0,255,255,0.5);
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-body{ padding:10px; }

/* UPLOADER */
.uploader{
  border:2px dashed rgba(255,255,255,.3);
  padding:25px;
  text-align:center;
  border-radius:12px;
  margin-bottom:20px;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:999;
  justify-content:center;
  align-items:center;
}

</style>
</head>

<body>

<!-- VIDEOS -->
<video autoplay muted loop id="loginVideo">
  <source src="bg1.mp4" type="video/mp4">
</video>

<video autoplay muted loop id="mainVideo">
  <source src="bg2.mp4" type="video/mp4">
</video>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box-modern">
    <img src="logo.png" class="mini-logo">
    <h2>Sign In</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password">

    <button id="loginBtn">Sign In</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>
  </div>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent" style="display:none;">

  <div class="navbar">
    <div class="nav-left">
      <img src="logo.png" class="nav-logo">
      <h2>Temple of Learning</h2>
    </div>
  </div>

  <div class="container">

    <input type="text" id="searchInput" placeholder="🔍 Search PPT...">

    <div class="uploader" id="dropZone">
      <p>📂 Drag & Drop PPT</p>
      <input type="file" id="fileInput">
      <button onclick="addByLink()">Add Link</button>
    </div>

    <div id="grid" class="grid"></div>

  </div>

</div>

<!-- MODAL -->
<div id="previewModal">
  <div style="width:85%; height:85%; background:#000; position:relative;">
    <button onclick="closePreview()" style="position:absolute; top:10px; right:10px;">❌</button>
    <button onclick="prevSlide()" style="position:absolute; left:10px; top:50%;">⬅️</button>
    <button onclick="nextSlide()" style="position:absolute; right:10px; top:50%;">➡️</button>
    <iframe id="previewFrame" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;

/* LOGIN */
loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
    mainContent.style.display="block";

    loginVideo.style.display="none";
    mainVideo.style.display="block";

  } else error.style.display="block";
};

/* LOAD */
async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

/* RENDER */
function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(i => (i.title || "").toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card">
    <img src="${it.thumbnail || 'https://via.placeholder.com/400x300'}">
    <div class="card-body">
      <h3>${it.title || "Untitled"}</h3>
      <button onclick="openPreview('${it.link}', ${i})">Preview</button>
      <button onclick="edit(${i})">Edit</button>
      <button onclick="del(${i})">Delete</button>
    </div>
  </div>`).join('');
}

searchInput.oninput = render;

/* EMBED */
function getEmbedLink(link){
  if(link.includes("docs.google.com/presentation")){
    return link.replace("/edit","/embed").replace("/view","/embed");
  }
  if(link.includes("drive.google.com")){
    const id = link.match(/[-\w]{25,}/);
    if(id) return `https://drive.google.com/file/d/${id[0]}/preview`;
  }
  if(link.includes("onedrive") || link.includes("sharepoint")){
    return link + "&action=embedview";
  }
  return link;
}

/* PREVIEW */
function openPreview(link,index){
  currentIndex = index;
  const embedLink = getEmbedLink(link);

  previewModal.style.display = "flex";
  previewFrame.src = embedLink;

  setTimeout(()=>{
    try{
      if(previewFrame.contentWindow.location.href === "about:blank"){
        window.open(link, "_blank");
      }
    }catch{
      window.open(link, "_blank");
    }
  },1500);
}

/* NAV */
function closePreview(){
  previewModal.style.display = "none";
  previewFrame.src = "";
}
function nextSlide(){
  currentIndex = (currentIndex + 1) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}
function prevSlide(){
  currentIndex = (currentIndex - 1 + items.length) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

/* DELETE */
async function del(i){
  await db.collection("ppts").doc(items[i].id).delete();
  load();
}

/* EDIT */
async function edit(i){
  const t = prompt("Title", items[i].title);
  const l = prompt("Link", items[i].link);
  const th = prompt("Thumbnail", items[i].thumbnail || "");

  await db.collection("ppts").doc(items[i].id).update({
    title: t || "Untitled",
    link: l || "#",
    thumbnail: th || ""
  });

  load();
}

/* ADD */
fileInput.onchange = e=>{
  const file = e.target.files[0];
  const link = prompt("Paste link:");
  const thumb = prompt("Thumbnail link:");

  db.collection("ppts").add({
    title: file?.name || "Untitled",
    link: link || "#",
    thumbnail: thumb || ""
  });

  load();
};

function addByLink(){
  const link = prompt("Paste link:");
  const title = prompt("Title:");
  const thumb = prompt("Thumbnail link:");

  db.collection("ppts").add({
    title: title || "Untitled",
    link: link || "#",
    thumbnail: thumb || ""
  });

  load();
}

dropZone.ondragover = e=>e.preventDefault();

dropZone.ondrop = e=>{
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  const link = prompt("Paste link:");
  const thumb = prompt("Thumbnail link:");

  db.collection("ppts").add({
    title: file?.name || "Untitled",
    link: link || "#",
    thumbnail: thumb || ""
  });

  load();
};

load();

</script>

</body>
</html>
