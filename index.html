<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
@import url('https://fonts.googleapis.com/css2?family=Road+Rage&display=swap');

/* BODY */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:url("bg2.gif") repeat center;
  background-size:cover;
}

/* LOGIN */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:url("bg1.gif") repeat center;
  background-size:cover;
  z-index:1000;
}

/* LOGOS */
.logo-top{
  position:absolute;
  top:30px;
  left:30px;
}
.logo-top img{
  width:220px;
}

.mini-logo{
  width:100px;
  margin-bottom:20px;
}

/* LOGIN BOX */
.login-box{
  width:420px;
  padding:50px 40px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  text-align:center;
}

/* INPUT */
.input-group input{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* BUTTON */
.login-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  cursor:pointer;
}

/* NAVBAR */
.navbar{
  padding:20px 40px;
  display:flex;
  align-items:center;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.nav-left{
  display:flex;
  align-items:center;
  gap:15px;
}

/* LOGO CONTAINER */
.logo-container{
  position:relative;
  width:80px;
  height:80px;
}

#fireCanvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

.nav-logo{
  position:relative;
  z-index:2;
  width:70px;
  animation: fireGlow 1.5s infinite alternate;
}

/* FIRE GLOW */
@keyframes fireGlow{
  0%{ filter:drop-shadow(0 0 5px orange); }
  100%{ filter:drop-shadow(0 0 20px red); }
}

/* TITLE */
.nav-title{
  font-family:"Road Rage", sans-serif;
  font-size:3rem;
  letter-spacing:2px;
  text-shadow:0 0 10px orange,0 0 20px red;
  animation:flicker 2s infinite;
}

/* TITLE ANIM */
@keyframes flicker{
  0%,100%{opacity:1;}
  50%{opacity:0.6;}
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-body{ padding:10px; }

.card-actions button{
  margin:3px;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box">
    <img src="logo.png" class="mini-logo">
    <h2>Welcome Back</h2>

    <div class="input-group">
      <input id="username" placeholder="Username">
    </div>

    <div class="input-group">
      <input id="password" type="password" placeholder="Password">
    </div>

    <button id="loginBtn" class="login-btn">Enter Temple</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">

    <div class="logo-container">
      <canvas id="fireCanvas"></canvas>
      <img src="logo.png" class="nav-logo">
    </div>

    <div class="nav-title">Temple of Learning</div>
  </div>
</div>

<!-- MAIN -->
<div class="container">
<input type="text" id="searchInput" placeholder="🔍 Search PPT...">
<div id="grid" class="grid"></div>
</div>

<!-- MODAL -->
<div id="previewModal">
  <iframe id="previewFrame" style="width:90%; height:90%;"></iframe>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;

/* LOGIN */
loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
  } else error.style.display="block";
};

/* LOAD DATA */
async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(i => (i.title || "").toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card">
    <img src="${it.thumbnail || 'https://via.placeholder.com/400x300'}">
    <div class="card-body">
      <h3>${it.title || "Untitled"}</h3>
      <div class="card-actions">
        <button onclick="openPreview('${it.link}',${i})">Preview</button>
        <button onclick="openNewTab('${it.link}')">Open</button>
        <button onclick="edit(${i})">Edit</button>
        <button onclick="del(${i})">Delete</button>
      </div>
    </div>
  </div>`).join('');
}

searchInput.oninput = render;

function openPreview(link,index){
  previewModal.style.display="flex";
  previewFrame.src = link;
}

function openNewTab(link){
  window.open(link,"_blank");
}

function closePreview(){
  previewModal.style.display="none";
}

/* 🔥 FIRE PARTICLES */
const canvas = document.getElementById("fireCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 80;
canvas.height = 80;

let particles = [];
let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e)=>{
  mouseX = e.clientX / window.innerWidth;
  mouseY = e.clientY / window.innerHeight;
});

class Particle{
  constructor(){
    this.x = canvas.width/2;
    this.y = canvas.height - 10;
    this.size = Math.random()*5+2;
    this.speedY = Math.random()*2+1;
    this.speedX = (Math.random()-0.5)*2;
    this.opacity = 1;
  }

  update(){
    this.y -= this.speedY;
    this.x += this.speedX;
    this.opacity -= 0.02;
  }

  draw(){
    let hue = 20 + mouseX*60;
    ctx.globalAlpha = this.opacity;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle = `hsl(${hue},100%,${50+mouseY*20}%)`;
    ctx.fill();
  }
}

function animateFire(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(particles.length < 50){
    particles.push(new Particle());
  }

  particles.forEach((p,i)=>{
    p.update();
    p.draw();
    if(p.opacity<=0) particles.splice(i,1);
  });

  requestAnimationFrame(animateFire);
}

animateFire();

load();
</script>

</body>
</html>
