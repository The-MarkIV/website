<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- ✅ NEW FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap" rel="stylesheet">

<style>

/* MAIN PAGE BACKGROUND */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:url("bg2.gif") repeat;
  background-size:cover;
}

/* NAVBAR */
.navbar{
  padding:15px 30px;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
}
.nav-left{
  display:flex;
  align-items:center;
  gap:15px;
}

/* ✅ UPDATED TITLE */
.nav-title{
  font-family:"Cinzel", serif;
  font-size:3.6rem; /* +30% */
  letter-spacing:2px;
  color:#fff;
  text-align:center;

  /* reduced static glow */
  text-shadow:
    0 0 4px #fff,
    0 0 8px #ff9800,
    0 0 16px #ff5722;
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:12px;
  margin-bottom:20px;
  border-radius:10px;
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px cyan, 0 0 40px rgba(0,255,255,0.5);
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-body{ padding:10px; }

/* BUTTONS */
.card-body button{
  padding:10px 14px;
  margin:5px 5px 0 0;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  z-index:999;
  justify-content:center;
  align-items:center;
}

/* UPLOADER */
.uploader {
  margin-bottom: 10px;
  padding: 30px;
  border: 2px dashed rgba(255,255,255,0.5);
  border-radius: 15px;
  text-align: center;
  background: rgba(255,255,255,0.05);
  cursor:pointer;
}

.uploader.dragover {
  border-color: #00ffff;
}

.uploader input {
  display:none;
}

.addLinkContainer {
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}

.addLinkContainer button{
  padding:12px 25px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <img src="logo.png" style="width:70px;">
    <h2 class="nav-title">Temple of Learning</h2>
  </div>
</div>

<!-- REST OF YOUR CODE UNCHANGED -->
