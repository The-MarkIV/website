<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* BASE */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:white;
  overflow:hidden;
}

/* 🎥 MAIN VIDEO */
.bg-video-main{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* LOGIN SCREEN */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
  z-index:10;
}

/* LOGIN VIDEO */
.bg-video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  opacity:0.5;
}

/* LOGO */
.logo-top{
  position:absolute;
  top:20px;
  left:30px;
}
.logo-top img{ width:150px; }

.mini-logo{ width:50px; }

/* LOGIN BOX */
.login-box-modern{
  background:rgba(0,0,0,0.7);
  padding:40px;
  border-radius:20px;
  text-align:center;
}

/* INPUT */
.login-box-modern input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
}

/* BUTTON */
.login-box-modern button{
  width:100%;
  padding:12px;
  background:orange;
  border:none;
  color:white;
  border-radius:10px;
}

/* NAVBAR */
.navbar{
  padding:15px;
  background:rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
}
.nav-logo{ width:40px; margin-right:10px; }

/* MAIN */
.container{ padding:20px; }

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

.card{
  background:rgba(0,0,0,0.6);
  border-radius:10px;
  overflow:hidden;
}
.card img{ width:100%; height:120px; object-fit:cover; }

.hidden{ display:none; }

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  z-index:20;
  justify-content:center;
  align-items:center;
}

</style>
</head>

<body>

<!-- 🎥 MAIN VIDEO -->
<video class="bg-video-main" autoplay muted loop playsinline>
  <source src="./bg2.mp4" type="video/mp4">
</video>

<!-- LOGIN -->
<div id="loginScreen">

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="./bg1.mp4" type="video/mp4">
  </video>

  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box-modern">
    <img src="logo.png" class="mini-logo">
    <h2>Sign In</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password">
    <button id="loginBtn">Sign In</button>
  </div>

</div>

<!-- MAIN CONTENT -->
<div id="mainContent" class="hidden">

  <div class="navbar">
    <img src="logo.png" class="nav-logo">
    <h2>Temple of Learning</h2>
  </div>

  <div class="container">
    <input id="searchInput" placeholder="Search..." style="width:100%; padding:10px;">

    <div id="grid" class="grid"></div>
  </div>

</div>

<!-- MODAL -->
<div id="previewModal">
  <iframe id="previewFrame" style="width:90%; height:90%;"></iframe>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;

/* LOGIN */
loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
    mainContent.classList.remove("hidden");
  }
};

/* LOAD */
async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

/* RENDER */
function render(){
  grid.innerHTML = items.map((it,i)=>`
  <div class="card">
    <img src="${it.thumbnail || 'https://via.placeholder.com/300'}">
    <h3>${it.title}</h3>
    <button onclick="openPreview('${it.link}',${i})">Preview</button>
  </div>
  `).join('');
}

/* PREVIEW */
function openPreview(link,index){
  currentIndex=index;
  previewModal.style.display="flex";
  previewFrame.src=link;
}

previewModal.onclick=()=>previewModal.style.display="none";

load();

</script>

</body>
</html>
