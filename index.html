<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* BACKGROUND */
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  color:#fff;
  background:linear-gradient(270deg,#0f2027,#203a43,#2c5364,#1a2a6c);
  background-size:600% 600%;
  animation:bgMove 15s ease infinite;
}
@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* LOGIN */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0f2027;
  z-index:10;
}

/* MENU */
.menu{ position:relative; display:inline-block; }
.menu button{ background:none; border:none; color:white; font-size:18px; cursor:pointer; }
.menu-content{
  display:none;
  position:absolute;
  right:0;
  background:rgba(0,0,0,0.9);
  border-radius:10px;
  min-width:120px;
}
.menu-content button{
  width:100%;
  background:none;
  border:none;
  color:white;
  padding:8px;
  text-align:left;
}
.menu-content button:hover{ background:rgba(255,255,255,0.1); }

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  padding:10px;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:black;
}

</style>
</head>

<body>

<div id="loginScreen">
  <div>
    <input id="username" placeholder="Username">
    <input id="password" type="password">
    <button id="loginBtn">Login</button>
    <p id="error" style="display:none;">Wrong login</p>
  </div>
</div>

<div class="container">

<button onclick="createFolder()">📁 New Folder</button>
<button onclick="goBack()">🔙 Back</button>

<input id="searchInput" placeholder="Search">

<div id="grid" class="grid"></div>

</div>

<div id="previewModal">
  <button onclick="closePreview()">❌</button>
  <button onclick="prevSlide()">⬅️</button>
  <button onclick="nextSlide()">➡️</button>
  <iframe id="previewFrame"></iframe>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;
let currentFolder = "root";
let folders = ["root"];

/* LOGIN */
loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
  } else error.style.display="block";
};

/* LOAD */
async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

/* RENDER */
function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML =
  folders.filter(f => f !== "root" && currentFolder==="root")
  .map(f=>`
    <div class="card" onclick="openFolder('${f}')">
      📁 ${f}
    </div>
  `).join('')
  +
  items
  .filter(i => (i.title||"").toLowerCase().includes(q) && (i.folder||"root")===currentFolder)
  .map((it,i)=>`
    <div class="card">
      <h3>${it.title}</h3>
      <button onclick="openPreview('${it.link}',${i})">Preview</button>
      <button onclick="openNewTab('${it.link}')">Open</button>

      <div class="menu">
        <button onclick="toggleMenu(event,${i})">⋮</button>
        <div class="menu-content" id="menu-${i}">
          <button onclick="renameItem(${i})">Rename</button>
          <button onclick="edit(${i})">Edit</button>
          <button onclick="del(${i})">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

searchInput.oninput = render;

/* PREVIEW */
function openPreview(link,index){
  currentIndex=index;
  previewModal.style.display="block";
  previewFrame.src=link;
}

function openNewTab(link){
  window.open(link,"_blank");
}

function closePreview(){
  previewModal.style.display="none";
}

function nextSlide(){
  currentIndex=(currentIndex+1)%items.length;
  openPreview(items[currentIndex].link,currentIndex);
}

function prevSlide(){
  currentIndex=(currentIndex-1+items.length)%items.length;
  openPreview(items[currentIndex].link,currentIndex);
}

/* KEYBOARD */
document.addEventListener("keydown",(e)=>{
  if(previewModal.style.display==="block"){
    if(e.key==="ArrowRight"||e.key===" ") nextSlide();
    if(e.key==="ArrowLeft") prevSlide();
    if(e.key==="Escape") closePreview();
    if(e.key==="Enter") toggleFullscreen();
  }
});

/* FULLSCREEN */
function toggleFullscreen(){
  if(!document.fullscreenElement){
    previewModal.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
}

/* SWIPE */
let startX=0;
previewModal.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
previewModal.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(startX-endX>50) nextSlide();
  if(endX-startX>50) prevSlide();
});

/* MENU */
function toggleMenu(e,i){
  e.stopPropagation();
  document.querySelectorAll(".menu-content").forEach(m=>m.style.display="none");
  document.getElementById("menu-"+i).style.display="block";
}
document.addEventListener("click",()=>{
  document.querySelectorAll(".menu-content").forEach(m=>m.style.display="none");
});

/* RENAME */
async function renameItem(i){
  const newName=prompt("New name:",items[i].title);
  if(newName){
    await db.collection("ppts").doc(items[i].id).update({title:newName});
    load();
  }
}

/* DELETE */
async function del(i){
  await db.collection("ppts").doc(items[i].id).delete();
  load();
}

/* EDIT */
async function edit(i){
  const t=prompt("Title",items[i].title);
  const l=prompt("Link",items[i].link);

  await db.collection("ppts").doc(items[i].id).update({
    title:t,
    link:l
  });
  load();
}

/* FOLDERS */
function createFolder(){
  const name=prompt("Folder name:");
  if(name){
    folders.push(name);
    render();
  }
}

function openFolder(name){
  currentFolder=name;
  render();
}

function goBack(){
  currentFolder="root";
  render();
}

/* ADD */
function addByLink(){
  const link=prompt("Link:");
  const title=prompt("Title:");

  db.collection("ppts").add({
    title:title,
    link:link,
    folder:currentFolder
  });
  load();
}

load();

</script>

</body>
</html>
