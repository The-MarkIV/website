<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:url("bg2.gif") repeat; /* FIXED REPEATING BACKGROUND */
  color:white;
}

/* ================= LOGIN PAGE (PREMIUM) ================= */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg, #667eea, #764ba2);
  z-index:999;
}

.logo-top{
  position:absolute;
  top:30px;
  left:30px;
}

.logo-top img{
  width:220px;
  filter: drop-shadow(0 0 25px white);
}

.login-box{
  width:420px;
  padding:50px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(25px);
  text-align:center;
  box-shadow:0 0 50px rgba(0,0,0,0.4);
  font-family:'Inter',sans-serif;
}

.login-box h2{
  font-size:28px;
  margin-bottom:30px;
}

.login-box input{
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

.login-box button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff9800,#ff5722);
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

/* ================= NAVBAR ================= */
.navbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 40px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(15px);
}

.nav-left{
  display:flex;
  align-items:center;
  gap:20px;
}

.nav-logo{
  width:80px; /* BIGGER LOGO */
}

.nav-title{
  font-size:32px; /* BIGGER TEXT */
  font-weight:700;
}

/* ================= MAIN ================= */
.container{
  padding:30px;
}

#searchInput{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:none;
  margin-bottom:25px;
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
}

/* ================= CARD ================= */
.card{
  background:rgba(255,255,255,0.1);
  border-radius:12px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px cyan;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-body{
  padding:12px;
}

.card button{
  margin:5px;
  padding:8px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* ================= MODAL ================= */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-box{
  width:85%;
  height:85%;
  position:relative;
}

.modal-box iframe{
  width:100%;
  height:100%;
  border:none;
}

.modal-box button{
  position:absolute;
  top:10px;
  background:white;
  border:none;
  padding:10px;
  cursor:pointer;
}

.close-btn{ right:10px; }
.left-btn{ left:10px; top:50%; }
.right-btn{ right:10px; top:50%; }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box">
    <h2>Welcome Back</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password">

    <button id="loginBtn">Enter Temple</button>
    <p id="error" style="color:red;display:none;">Wrong login</p>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">
    <img src="logo.png" class="nav-logo">
    <div class="nav-title">Temple of Learning</div>
  </div>
</div>

<!-- MAIN -->
<div class="container">

<input type="text" id="searchInput" placeholder="🔍 Search PPT...">

<div class="grid" id="grid"></div>

</div>

<!-- MODAL -->
<div id="previewModal">
  <div class="modal-box">
    <button class="close-btn" onclick="closePreview()">❌</button>
    <button class="left-btn" onclick="prevSlide()">⬅️</button>
    <button class="right-btn" onclick="nextSlide()">➡️</button>
    <iframe id="previewFrame"></iframe>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;

/* LOGIN */
loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
  } else error.style.display="block";
};

/* LOAD */
async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

/* RENDER */
function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(i => (i.title || "").toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card">
    <img src="${it.thumbnail || 'https://via.placeholder.com/400x300'}">
    <div class="card-body">
      <h3>${it.title || "Untitled"}</h3>
      <button onclick="openPreview('${it.link}', ${i})">Preview</button>
      <button onclick="openNewTab('${it.link}')">Open</button>
      <button onclick="edit(${i})">Edit</button>
      <button onclick="del(${i})">Delete</button>
    </div>
  </div>`).join('');
}

searchInput.oninput = render;

/* PREVIEW FIX */
function getEmbedLink(link){
  if(link.includes("docs.google.com")){
    return link.replace("/edit","/embed");
  }
  if(link.includes("drive.google.com")){
    const id = link.match(/[-\w]{25,}/);
    if(id) return `https://drive.google.com/file/d/${id[0]}/preview`;
  }
  return null; // BLOCK SHAREPOINT
}

function openPreview(link,index){
  const embed = getEmbedLink(link);

  if(!embed){
    alert("Preview not supported. Opening in new tab.");
    openNewTab(link);
    return;
  }

  currentIndex = index;
  previewModal.style.display = "flex";
  previewFrame.src = embed;
}

function openNewTab(link){
  window.open(link, "_blank");
}

function closePreview(){
  previewModal.style.display="none";
  previewFrame.src="";
}

function nextSlide(){
  currentIndex = (currentIndex+1)%items.length;
  openPreview(items[currentIndex].link,currentIndex);
}

function prevSlide(){
  currentIndex = (currentIndex-1+items.length)%items.length;
  openPreview(items[currentIndex].link,currentIndex);
}

/* DELETE */
async function del(i){
  await db.collection("ppts").doc(items[i].id).delete();
  load();
}

/* EDIT */
async function edit(i){
  const t = prompt("Title", items[i].title);
  const l = prompt("Link", items[i].link);
  const th = prompt("Thumbnail", items[i].thumbnail || "");

  await db.collection("ppts").doc(items[i].id).update({
    title: t,
    link: l,
    thumbnail: th
  });

  load();
}

load();

</script>

</body>
</html>
