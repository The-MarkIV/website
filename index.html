<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple of Learning</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:#fff;
}

/* ================= LOGIN PAGE ================= */
#loginScreen{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:url("bg1.gif") center/cover;
  z-index:1000;
}

/* LOGOS */
.logo-top{
  position:absolute;
  top:30px;
  left:30px;
}
.logo-top img{
  width:200px;
  filter: drop-shadow(0 0 25px white);
  transition:0.4s;
}
.logo-top img:hover{
  transform:scale(1.1);
}

.mini-logo{
  width:90px;
  margin-bottom:20px;
  filter: drop-shadow(0 0 15px white);
}

/* LOGIN BOX */
.login-box{
  width:520px;
  padding:60px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(20px);
  border-radius:20px;
  text-align:center;
  animation:fadeIn 0.8s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

.login-box input{
  width:100%;
  padding:15px;
  margin:12px 0;
  border:none;
  border-radius:10px;
}

.login-btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#ff7b00,#ff3d00);
  color:#fff;
  cursor:pointer;
}

#error{
  color:red;
  display:none;
}

/* ================= MAIN PAGE ================= */
#mainPage{
  display:none;
  min-height:100vh;
  background:url("bg2.gif");
  background-repeat:repeat;
  background-size:400px;
}

/* NAVBAR (UPGRADED) */
.navbar{
  padding:25px 50px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(15px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.nav-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.nav-logo{
  width:70px;
  border-radius:12px;
  filter: drop-shadow(0 0 15px orange);
  transition:0.4s;
}
.nav-logo:hover{
  transform:scale(1.1) rotate(5deg);
  filter: drop-shadow(0 0 25px orange) drop-shadow(0 0 40px gold);
}

.nav-left h2{
  font-size:2.2rem;
  font-weight:700;
  letter-spacing:1px;
  background: linear-gradient(90deg, #4facfe, #00f2fe, #a18cd1);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:glowText 5s linear infinite;
}

@keyframes glowText{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

/* MAIN */
.container{ padding:30px; }

#searchInput{
  width:100%;
  padding:18px;
  border-radius:15px;
  border:none;
  margin-bottom:25px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:rgba(0,0,0,0.5);
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover{
  transform:scale(1.05);
}
.card img{
  width:100%;
  height:150px;
  object-fit:cover;
}
.card-body{ padding:10px; }

/* UPLOADER */
.uploader{
  border:2px dashed rgba(255,255,255,.3);
  padding:25px;
  text-align:center;
  border-radius:12px;
  margin-bottom:20px;
}

/* MODAL */
#previewModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="login-box">
    <img src="logo.png" class="mini-logo">
    <h2>Welcome Back</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn" class="login-btn">Enter Temple</button>
    <p id="error">Wrong login</p>
  </div>
</div>

<!-- MAIN -->
<div id="mainPage">

  <div class="navbar">
    <div class="nav-left">
      <img src="logo.png" class="nav-logo">
      <h2>Temple of Learning</h2>
    </div>
  </div>

  <div class="container">

    <input type="text" id="searchInput" placeholder="🔍 Search PPT...">

    <div class="uploader" id="dropZone">
      <p>📂 Drag & Drop PPT</p>
      <input type="file" id="fileInput">
      <button onclick="addByLink()">Add Link</button>
    </div>

    <div id="grid" class="grid"></div>

  </div>

</div>

<!-- MODAL -->
<div id="previewModal">
  <div style="width:85%; height:85%; background:#000; position:relative;">
    <button onclick="closePreview()" style="position:absolute; top:10px; right:10px;">❌</button>
    <button onclick="prevSlide()" style="position:absolute; left:10px; top:50%;">⬅️</button>
    <button onclick="nextSlide()" style="position:absolute; right:10px; top:50%;">➡️</button>
    <iframe id="previewFrame" style="width:100%; height:100%; border:none;"></iframe>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

/* LOGIN */
loginBtn.onclick = ()=>{
  if(username.value==="admin" && password.value==="1234"){
    loginScreen.style.display="none";
    mainPage.style.display="block";
  } else error.style.display="block";
};

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "temple-of-learning.firebaseapp.com",
  projectId: "temple-of-learning"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let items = [];
let currentIndex = 0;

async function load(){
  const snap = await db.collection("ppts").get();
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
}

function render(){
  const q = searchInput.value.toLowerCase();

  grid.innerHTML = items
  .filter(i => (i.title || "").toLowerCase().includes(q))
  .map((it,i)=>`
  <div class="card">
    <img src="${it.thumbnail || 'https://via.placeholder.com/400x300'}">
    <div class="card-body">
      <h3>${it.title || "Untitled"}</h3>
      <button onclick="openPreview('${it.link}', ${i})">Preview</button>
      <button onclick="openNewTab('${it.link}')">Open</button>
      <button onclick="edit(${i})">Edit</button>
      <button onclick="del(${i})">Delete</button>
    </div>
  </div>`).join('');
}

searchInput.oninput = render;

function getEmbedLink(link){
  if(link.includes("docs.google.com")){
    return link.replace("/edit","/preview");
  }
  return null;
}

function openPreview(link,index){
  const embed = getEmbedLink(link);
  if(!embed){
    alert("Preview not supported. Use Open button.");
    return;
  }
  currentIndex = index;
  previewModal.style.display = "flex";
  previewFrame.src = embed;
}

function openNewTab(link){
  window.open(link, "_blank");
}

function closePreview(){
  previewModal.style.display = "none";
  previewFrame.src = "";
}

function nextSlide(){
  currentIndex = (currentIndex + 1) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

function prevSlide(){
  currentIndex = (currentIndex - 1 + items.length) % items.length;
  openPreview(items[currentIndex].link, currentIndex);
}

load();

</script>

</body>
</html>
